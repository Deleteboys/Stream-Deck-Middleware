name: Release App

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versions-Bump'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Frontend Dependencies
        run: npm install

      - name: Prepare Git & Commit Lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: sync lockfile before bump" || echo "Keine Änderungen zum Committen"

      - name: Bump Version
        run: |
          npm version ${{ github.event.inputs.version }} -m "chore: bump version to %s"
          git push --follow-tags

      - name: Build & Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "Middleware v__VERSION__"
          releaseBody: "Neues Update für die Streamdeck Middleware."
          releaseDraft: false
          prerelease: false
